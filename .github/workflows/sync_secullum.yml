name: AllocAI Sync Secullum

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest

    env:
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
      SECULLUM_USER: ${{ secrets.SECULLUM_USER }}
      SECULLUM_PASS: ${{ secrets.SECULLUM_PASS }}

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Instalar dependências
        run: |
          pip install supabase python-dotenv playwright openpyxl
          playwright install chromium --with-deps
      - name: Rodar sync Secullum
        run: python sync_secullum.py
